<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - ITXMEN</title>
    <meta name="description" content="Schedule a free consultation and see how ITXMEN can help your business thrive.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">

    <style>
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .form-group label {
            font-weight: 500;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 1rem;
            border-radius: var(--border-radius-md);
            background: rgba(13, 15, 18, 0.5);
            border: 1px solid var(--card-border);
            color: var(--text-primary);
            font-family: inherit;
            transition: border-color var(--transition-fast);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
        }

        @media (max-width: 768px) {
            .contact-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
            }
        }
    </style>
</head>

<body>

    <div id="site-header-container"></div>

    <main>
        <section class="container" style="padding: 6rem 2rem 4rem;">
            <div class="contact-grid">
                <!-- Contact Info Side -->
                <div class="fade-in-up">
                    <h1 class="hero-title" style="font-size: 3rem;">Let’s Talk About Your <span class="gradient-text">IT
                            Challenges</span></h1>
                    <p class="hero-description" style="margin-bottom: 2rem;">Ready to take your IT to the next level?
                        Schedule a free consultation and see how ITXMEN can help your business thrive.</p>

                    <div style="margin-top: 3rem;">
                        <div style="display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;">
                            <div class="feature-icon" style="width: 40px; height: 40px; margin-bottom: 0;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z">
                                    </path>
                                    <polyline points="22,6 12,13 2,6"></polyline>
                                </svg>
                            </div>
                            <span style="font-size: 1.1rem; color: var(--text-secondary);">hello@itxmen.com</span>
                        </div>

                        <div style="display: flex; align-items: center; gap: 1rem;">
                            <div class="feature-icon" style="width: 40px; height: 40px; margin-bottom: 0;">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                                    stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path
                                        d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z">
                                    </path>
                                </svg>
                            </div>
                            <span style="font-size: 1.1rem; color: var(--text-secondary);">1 (800) ITX-MENS</span>
                        </div>
                    </div>
                </div>

                <!-- Form Side -->
                <div class="glass-card fade-in-up" style="transition-delay: 0.2s;">
                    <form class="contact-form"
                        onsubmit="event.preventDefault(); alert('This is a demo! Message not sent.');">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" required placeholder="Stephen Nolan">
                        </div>

                        <div class="form-group">
                            <label for="email">Work Email</label>
                            <input type="email" id="email" required placeholder="stephen@company.com">
                        </div>

                        <div class="form-group">
                            <label for="interest">Area of Interest</label>
                            <select id="interest">
                                <option value="leadership">Fractional IT Leadership</option>
                                <option value="ai">AI Strategy</option>
                                <option value="cloud">Cloud Strategy</option>
                                <option value="security">Cybersecurity & Compliance</option>
                                <option value="other">Other / General Assessment</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="message">How can we help?</label>
                            <textarea id="message" rows="4"
                                placeholder="Tell us about your IT challenges..."></textarea>
                        </div>

                        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">Send
                            Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="site-footer-container"></div>
    <script src="js/main.js"></script>
</body>

</html>
